<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle with Cabo Verde blue -->
  <circle cx="32" cy="32" r="32" fill="#0052CC"/>
  
  <!-- Outer ring in red (Cabo Verde flag color) -->
  <circle cx="32" cy="32" r="32" fill="none" stroke="#EF3B39" stroke-width="2"/>
  
  <!-- Finance coin element - yellow circle -->
  <circle cx="32" cy="32" r="20" fill="#FFD700"/>
  
  <!-- Coin shine/highlight in white -->
  <circle cx="26" cy="26" r="6" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Chart/Upward trend line in blue -->
  <g stroke="#0052CC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upward trend line -->
    <polyline points="20,38 26,32 32,35 42,24"/>
  </g>
  
  <!-- Currency symbol - stylized C for CVE (Cabo Verde Escudo) -->
  <text x="32" y="38" font-size="20" font-weight="bold" fill="#0052CC" text-anchor="middle" font-family="Arial, sans-serif">$</text>
</svg>